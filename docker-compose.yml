services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crypto_portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crypto_portfolio}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_portfolio}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: ${APP_NAME:-Binance Spot Portfolio Tracker}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_PREFIX: ${API_PREFIX:-/api}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-crypto_portfolio_user}:${POSTGRES_PASSWORD:-crypto_portfolio}@postgres:5432/${POSTGRES_DB:-crypto_portfolio}
      BINANCE_BASE_URL: ${BINANCE_BASE_URL:-https://api.binance.com}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      BINANCE_RECV_WINDOW_MS: ${BINANCE_RECV_WINDOW_MS:-5000}
      BINANCE_SYMBOLS: ${BINANCE_SYMBOLS:-}
      BINANCE_TRADE_SYNC_START_MS: ${BINANCE_TRADE_SYNC_START_MS:-}
      BINANCE_HISTORY_SYNC_START_MS: ${BINANCE_HISTORY_SYNC_START_MS:-}
      PORTFOLIO_BASE_ASSET: ${PORTFOLIO_BASE_ASSET:-USDT}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD_HASH: ${DASHBOARD_PASSWORD_HASH:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      INCLUDE_EARN_REWARDS_IN_PNL: ${INCLUDE_EARN_REWARDS_IN_PNL:-true}
      COST_BASIS_METHOD: ${COST_BASIS_METHOD:-FIFO}
      PRICE_SYNC_INTERVAL_SECONDS: ${PRICE_SYNC_INTERVAL_SECONDS:-300}
      RECORDS_SYNC_INTERVAL_SECONDS: ${RECORDS_SYNC_INTERVAL_SECONDS:-1800}
      SNAPSHOT_INTERVAL_SECONDS: ${SNAPSHOT_INTERVAL_SECONDS:-3600}
      FULL_RECONCILIATION_INTERVAL_SECONDS: ${FULL_RECONCILIATION_INTERVAL_SECONDS:-86400}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-15}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: sh -c "uv run --no-sync alembic upgrade head && uv run --no-sync python -m app.worker"
    environment:
      APP_NAME: ${APP_NAME:-Binance Spot Portfolio Tracker}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_PREFIX: ${API_PREFIX:-/api}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-crypto_portfolio_user}:${POSTGRES_PASSWORD:-crypto_portfolio}@postgres:5432/${POSTGRES_DB:-crypto_portfolio}
      BINANCE_BASE_URL: ${BINANCE_BASE_URL:-https://api.binance.com}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      BINANCE_RECV_WINDOW_MS: ${BINANCE_RECV_WINDOW_MS:-5000}
      BINANCE_SYMBOLS: ${BINANCE_SYMBOLS:-}
      BINANCE_TRADE_SYNC_START_MS: ${BINANCE_TRADE_SYNC_START_MS:-}
      BINANCE_HISTORY_SYNC_START_MS: ${BINANCE_HISTORY_SYNC_START_MS:-}
      PORTFOLIO_BASE_ASSET: ${PORTFOLIO_BASE_ASSET:-USDT}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD_HASH: ${DASHBOARD_PASSWORD_HASH:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      INCLUDE_EARN_REWARDS_IN_PNL: ${INCLUDE_EARN_REWARDS_IN_PNL:-true}
      COST_BASIS_METHOD: ${COST_BASIS_METHOD:-FIFO}
      PRICE_SYNC_INTERVAL_SECONDS: ${PRICE_SYNC_INTERVAL_SECONDS:-300}
      RECORDS_SYNC_INTERVAL_SECONDS: ${RECORDS_SYNC_INTERVAL_SECONDS:-1800}
      SNAPSHOT_INTERVAL_SECONDS: ${SNAPSHOT_INTERVAL_SECONDS:-3600}
      FULL_RECONCILIATION_INTERVAL_SECONDS: ${FULL_RECONCILIATION_INTERVAL_SECONDS:-86400}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-15}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
